<!DOCTYPE html>
<html>
<head>
<title>DATA NODE</title>

<style>
body {
    margin: 0;
    background: black;
    color: cyan;
    font-family: monospace;
    overflow: hidden;
}

.crt::before {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.05),
        rgba(255,255,255,.05) 1px,
        transparent 1px,
        transparent 4px
    );
    opacity: .15;
    pointer-events: none;
}

.crt::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, transparent 55%, rgba(0,0,0,.7) 100%);
    pointer-events: none;
}

/* screens */
#uploadScreen {
    text-align: center;
    padding-top: 80px;
}

#boot {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    text-align: center;
    padding-top: 120px;
}

#app {
    display: none;
    padding: 40px;
    text-align: center;
}

/* buttons */
button {
    margin: 10px;
    padding: 12px 18px;
    background: black;
    color: cyan;
    border: 1px solid cyan;
    cursor: pointer;
}

.panel {
    display: none;
    margin-top: 20px;
}

/* PETRI DISH */
#petri {
    background: #050a05;
    border: 2px solid cyan;
    border-radius: 50%;
    display: block;
    margin: 20px auto;
}

/* pH */
.phGrid {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

#result {
    margin-top: 15px;
    white-space: pre-wrap;
}
</style>
</head>

<body class="crt">

<!-- UPLOAD -->
<div id="uploadScreen">
    <h2>UPLOAD RECOVERED FILE</h2>
    <input type="file" id="fileInput">
    <p id="status">AWAITING INPUT...</p>
</div>

<!-- BOOT -->
<div id="boot">
    <h2 id="bootText">INITIALIZING...</h2>
</div>

<!-- APP -->
<div id="app">

    <h1>DATA NODE ACCESS GRANTED</h1>

    <button onclick="showPanel('audio')">AUDIO LOG</button>
    <button onclick="showPanel('ph')">pH ANALYSIS</button>
    <button onclick="showNotebook()">LAB NOTEBOOK</button>

    <div id="audioPanel" class="panel">
        <audio controls>
            <source src="audio-log.mp3">
        </audio>
    </div>

    <div id="phPanel" class="panel">

        <canvas id="petri" width="400" height="400"></canvas>

        <div class="phGrid">
            <select id="acid">
                <option value="1">Acid 1</option>
                <option value="2">Acid 2</option>
                <option value="3">Acid 3</option>
            </select>

            <select id="base">
                <option value="1">Base 1</option>
                <option value="2">Base 2</option>
                <option value="3">Base 3</option>
            </select>

            <select id="stabilizer">
                <option value="1">Stabilizer 1</option>
                <option value="2">Stabilizer 2</option>
                <option value="3">Stabilizer 3</option>
            </select>
        </div>

        <button onclick="checkPH()">SUBMIT</button>
        <div id="result"></div>
    </div>
</div>

<script>

let attempt = 0;

/* =========================
   BOOT FIX
========================= */

const fileInput = document.getElementById("fileInput");
const statusText = document.getElementById("status");
const boot = document.getElementById("boot");
const bootText = document.getElementById("bootText");
const app = document.getElementById("app");
const uploadScreen = document.getElementById("uploadScreen");

fileInput.addEventListener("change", () => {

    const file = fileInput.files[0];
    if (!file) return;

    if (!file.type.startsWith("image/")) {
        statusText.innerText = "INVALID FILE TYPE";
        return;
    }

    statusText.innerText = "IMAGE RECEIVED";

    uploadScreen.style.display = "none";
    boot.style.display = "block";

    const msgs = [
        "SCANNING IMAGE STRUCTURE...",
        "DETECTING BIOLOGICAL PATTERNS...",
        "ANALYZING ANOMALIES...",
        "FINALIZING DATA MODEL..."
    ];

    let i = 0;
    const interval = setInterval(() => {
        if (i < msgs.length) {
            bootText.innerText = msgs[i++];
        } else {
            clearInterval(interval);
            bootText.innerText = "ANALYSIS COMPLETE";

            setTimeout(() => {
                boot.style.display = "none";
                app.style.display = "block";
                initEcoli();   // start bacteria AFTER unlock
                drawPetri();
            }, 1000);
        }
    }, 1200);
});

/* =========================
   MENU
========================= */

function showPanel(type) {
    document.querySelectorAll(".panel").forEach(p => p.style.display = "none");
    document.getElementById(type + "Panel").style.display = "block";
}

/* =========================
   PETRI DISH SYSTEM
========================= */

const canvas = document.getElementById("petri");
const ctx = canvas.getContext("2d");

let ecoli = [];

function initEcoli(count = 60) {
    ecoli = [];
    for (let i = 0; i < count; i++) {
        ecoli.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 1.5,
            vy: (Math.random() - 0.5) * 1.5,
            alive: true
        });
    }
}

function drawPetri() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let b of ecoli) {
        if (!b.alive) {
    ctx.fillStyle = "rgba(0,255,0,0.08)";
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
    ctx.fill();
    continue;
}

        b.x += b.vx;
        b.y += b.vy;

        if (b.x < 0 || b.x > canvas.width) b.vx *= -1;
        if (b.y < 0 || b.y > canvas.height) b.vy *= -1;

        ctx.beginPath();
        ctx.fillStyle = "lime";
        ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
        ctx.fill();
    }

    requestAnimationFrame(drawPetri);
}
function resetPetri(count = 60) {

    ecoli = [];

    for (let i = 0; i < count; i++) {
        ecoli.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 1.5,
            vy: (Math.random() - 0.5) * 1.5,
            alive: true
        });
    }
}

/* =========================
   KILL ANIMATION (ONE BY ONE)
========================= */

function killEcoli(amount, delay = 80) {

    let alive = ecoli.filter(e => e.alive);

    for (let i = 0; i < amount && alive.length > 0; i++) {

        setTimeout(() => {

            let stillAlive = ecoli.filter(e => e.alive);
            if (stillAlive.length === 0) return;

            let target = stillAlive[Math.floor(Math.random() * stillAlive.length)];
            target.alive = false;

        }, i * delay);
    }
}

/* =========================
   pH SYSTEM
========================= */

function checkPH() {
    
    resetPetri();
    let ph = 7;

    const acid = parseInt(document.getElementById("acid").value);
    const base = parseInt(document.getElementById("base").value);
    const stab = parseInt(document.getElementById("stabilizer").value);

    switch(acid){
        case 1: ph -= 1.5; break;
        case 2: ph -= 2.8; break;
        case 3: ph -= 2.0; break;
    }

    switch(base){
        case 1: ph += 2.5; break;
        case 2: ph += 0.3; break;
        case 3: ph += 1.2; break;
    }

    switch(stab){
        case 1: ph = 7 + (ph-7)*0.7; break;
        case 2: ph = 7 + (ph-7)*0.45; break;
        case 3: ph = 7 + (ph-7)*0.6; break;
    }

    ph = Math.max(0, Math.min(14, ph));

    attempt++;

    const inTarget = (ph >= 5 && ph <= 6);
    const close = (ph >= 4 && ph <= 7);

    let aliveCount = ecoli.filter(e => e.alive).length;

    if (!close) {
        // nothing happens
    }
    else if (inTarget) {
       killEcoli(aliveCount, 40); // full wipe
    }
    else {
        killEcoli(Math.floor(aliveCount * 0.35), 60);// partial wipe
    }

    document.getElementById("result").innerHTML =
        `ENTRY #${attempt}<br><br>
        pH: <b>${ph.toFixed(2)}</b><br>
        STATUS: <b>${inTarget ? "PERFECT WINDOW" : close ? "CLOSE RANGE" : "NO EFFECT"}</b>`;
}

/* =========================
   NOTEBOOK (optional)
========================= */

function showNotebook() {
    document.getElementById("result").innerText = "Notebook system ready (can expand later).";
}

</script>

</body>
</html>
