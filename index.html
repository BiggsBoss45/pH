<!DOCTYPE html>
<html>
<head>
<title>DATA NODE</title>

<style>
body {
    margin: 0;
    background: black;
    color: cyan;
    font-family: monospace;
    overflow: hidden;
}

/* CRT */
.crt::before {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.05),
        rgba(255,255,255,.05) 1px,
        transparent 1px,
        transparent 4px
    );
    opacity: .15;
    pointer-events: none;
}

.crt::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, transparent 55%, rgba(0,0,0,.7) 100%);
    pointer-events: none;
}

/* BOOT SCREEN */
#boot {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    text-align: center;
    padding-top: 120px;
}

/* MAIN UI */
#app {
    display: none;
    padding: 40px;
    text-align: center;
}

button {
    margin: 10px;
    padding: 12px 18px;
    background: black;
    color: cyan;
    border: 1px solid cyan;
    cursor: pointer;
    font-family: monospace;
}

/* PANELS */
.panel {
    display: none;
    margin-top: 30px;
}

/* pH GRID */
.phGrid {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

.phGrid input {
    width: 140px;
    padding: 10px;
    background: black;
    color: cyan;
    border: 1px solid cyan;
    text-align: center;
}

/* RESULT */
#result {
    margin-top: 15px;
}
</style>
</head>

<body class="crt">

<!-- UPLOAD -->
<div id="uploadScreen" style="text-align:center; padding-top:60px;">
    <h2>UPLOAD RECOVERED FILE</h2>
    <input type="file" id="fileInput">
    <p id="status">AWAITING INPUT...</p>
</div>

<!-- BOOT -->
<div id="boot">
    <h2 id="bootText">INITIALIZING...</h2>
</div>

<!-- MAIN APP -->
<div id="app">

    <h1>DATA NODE ACCESS GRANTED</h1>

    <!-- MENU -->
    <div>
        <button onclick="showPanel('audio')">AUDIO LOG</button>
        <button onclick="showPanel('ph')">pH ANALYSIS</button>
    </div>

    <!-- AUDIO -->
    <div id="audioPanel" class="panel">
        <h2>AUDIO LOG</h2>
        <audio controls>
            <source src="audio-log.mp3">
        </audio>
    </div>

    <!-- pH -->
    <div id="phPanel" class="panel">

        <h2>CHEMICAL STABILITY ANALYSIS</h2>

        <p>Select 1 Acid, 1 Base, 1 Stabilizer</p>

        <div class="phGrid">
            <input id="acid" placeholder="ACID">
            <input id="base" placeholder="BASE">
            <input id="stabilizer" placeholder="STABILIZER">
        </div>

        <button onclick="checkPH()">SUBMIT</button>

        <p id="result"></p>
    </div>

</div>

<script>

const fileInput = document.getElementById("fileInput");
const status = document.getElementById("status");

const boot = document.getElementById("boot");
const bootText = document.getElementById("bootText");

const app = document.getElementById("app");

fileInput.addEventListener("change", () => {

    if (!fileInput.files[0]) return;

    status.innerText = "DATA RECEIVED";

    boot.style.display = "block";

    let msgs = [
        "INITIALIZING EXTRACTION...",
        "DECRYPTING SIGNAL...",
        "REBUILDING DATA STRUCTURE...",
        "FINALIZING..."
    ];

    let i = 0;

    let interval = setInterval(() => {

        if (i < msgs.length) {
            bootText.innerText = msgs[i];
            i++;
        } else {
            clearInterval(interval);

            bootText.innerText = "ACCESS GRANTED";

            setTimeout(() => {
                boot.style.display = "none";
                app.style.display = "block";
            }, 1200);
        }

    }, 1200);
});

/* MENU SWITCH */
function showPanel(type) {

    document.getElementById("audioPanel").style.display = "none";
    document.getElementById("phPanel").style.display = "none";

    document.getElementById(type + "Panel").style.display = "block";
}

/* pH LOGIC */
function checkPH() {

    const acid = document.getElementById("acid").value.toLowerCase();
    const base = document.getElementById("base").value.toLowerCase();
    const stab = document.getElementById("stabilizer").value.toLowerCase();

    const validAcids = ["vinegar"];
    const validBases = ["baking soda"];
    const validStab = ["sugar", "water"];

    if (
        validAcids.includes(acid) &&
        validBases.includes(base) &&
        validStab.includes(stab)
    ) {
        document.getElementById("result").innerText =
            "STABLE PH RANGE ACHIEVED (5–6)";
    } else {
        document.getElementById("result").innerText =
            "UNSTABLE COMBINATION";
    }
}

</script>

</body>
</html>
