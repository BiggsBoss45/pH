<!DOCTYPE html>
<html>
<head>
<title>DATA NODE</title>

<style>
body {
    margin: 0;
    background: black;
    color: cyan;
    font-family: monospace;
    overflow: hidden;
}

/* CRT */
.crt::before {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.05),
        rgba(255,255,255,.05) 1px,
        transparent 1px,
        transparent 4px
    );
    opacity: .15;
    pointer-events: none;
}

.crt::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, transparent 55%, rgba(0,0,0,.7) 100%);
    pointer-events: none;
}

/* UPLOAD */
#uploadScreen {
    text-align: center;
    padding-top: 80px;
}

/* BOOT */
#boot {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    text-align: center;
    padding-top: 120px;
}

/* APP */
#app {
    display: none;
    padding: 40px;
    text-align: center;
}

/* BUTTONS */
button {
    margin: 10px;
    padding: 12px 18px;
    background: black;
    color: cyan;
    border: 1px solid cyan;
    cursor: pointer;
}

/* PANELS */
.panel {
    display: none;
    margin-top: 30px;
}

/* INPUTS */
.phGrid {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

.phGrid input {
    width: 140px;
    padding: 10px;
    background: black;
    color: cyan;
    border: 1px solid cyan;
    text-align: center;
}

/* RESULT */
#result {
    margin-top: 15px;
    white-space: pre-wrap;
}
</style>
</head>

<body class="crt">

<!-- UPLOAD SCREEN -->
<div id="uploadScreen">
    <h2>UPLOAD RECOVERED FILE</h2>
    <input type="file" id="fileInput">
    <p id="status">AWAITING INPUT...</p>
</div>

<!-- BOOT -->
<div id="boot">
    <h2 id="bootText">INITIALIZING...</h2>
</div>

<!-- MAIN APP -->
<div id="app">

    <h1>DATA NODE ACCESS GRANTED</h1>

    <button onclick="showPanel('audio')">AUDIO LOG</button>
    <button onclick="showPanel('ph')">pH ANALYSIS</button>
    <button onclick="showNotebook()">LAB NOTEBOOK</button>

    <!-- AUDIO -->
    <div id="audioPanel" class="panel">
        <h2>AUDIO LOG</h2>
        <audio controls>
            <source src="audio-log.mp3">
        </audio>
    </div>

    <!-- pH -->
    <div id="phPanel" class="panel">
        <h2>CHEMICAL STABILITY ANALYSIS</h2>

        <p>Select 1 Acid, 1 Base, 1 Stabilizer</p>

        <div class="phGrid">
    <select id="acid">
        <option value="1">1 - Acid 1</option>
        <option value="2">2 - Acid 2</option>
        <option value="3">3 - Acid 3</option>
    </select>

    <select id="base">
        <option value="1">1 - Base 1</option>
        <option value="2">2 - Base 2</option>
        <option value="3">3 - Base 3</option>
    </select>

    <select id="stabilizer">
        <option value="1">1 - Stabilizer 1</option>
        <option value="2">2 - Stabilizer 2</option>
        <option value="3">3 - Stabilizer 3</option>
    </select>
</div>

        <button onclick="checkPH()">SUBMIT</button>

        <div id="result"></div>
    </div>

</div>
<script>

window.addEventListener("DOMContentLoaded", () => {

let attempt = 0;

const fileInput = document.getElementById("fileInput");
const statusText = document.getElementById("status");

const boot = document.getElementById("boot");
const bootText = document.getElementById("bootText");
const app = document.getElementById("app");
const uploadScreen = document.getElementById("uploadScreen");
    
fileInput.addEventListener("change", () => {

    const file = fileInput.files[0];
    if (!file) return;

    // only accept images
    if (!file.type.startsWith("image/")) {
        statusText.innerText = "INVALID FILE TYPE";
        return;
    }

    statusText.innerText = "IMAGE RECEIVED";

    uploadScreen.style.display = "none";
    boot.style.display = "block";

    const reader = new FileReader();

    reader.onload = () => {

        localStorage.setItem("uploadedImage", reader.result);

        const msgs = [
            "SCANNING IMAGE STRUCTURE...",
            "DETECTING BIOLOGICAL PATTERNS...",
            "ANALYZING ANOMALIES...",
            "FINALIZING DATA MODEL..."
        ];

        let i = 0;

        const interval = setInterval(() => {

            if (i < msgs.length) {
                bootText.innerText = msgs[i];
                i++;
            } else {
                clearInterval(interval);

                bootText.innerText = "IMAGE ANALYSIS COMPLETE";

                setTimeout(() => {
                    boot.style.display = "none";
                    app.style.display = "block";
                }, 1000);
            }

        }, 1200);
    };

    reader.readAsDataURL(file);
});
/* =========================
   MENU SYSTEM
========================= */

function showPanel(type) {
    document.querySelectorAll(".panel").forEach(p => p.style.display = "none");
    document.getElementById(type + "Panel").style.display = "block";
}

/* =========================
   NOTEBOOK SYSTEM
========================= */

function getNotebook() {
    return JSON.parse(localStorage.getItem("labNotebook") || "[]");
}

function saveNotebook(log) {
    localStorage.setItem("labNotebook", JSON.stringify(log));
}

function showNotebook() {

    const log = getNotebook();

    let out = "LAB NOTEBOOK\n\n";

    log.forEach(e => {
        out += `ENTRY #${e.attempt}
Acid: ${e.acid}
Base: ${e.base}
Stabilizer: ${e.stabilizer}
pH: ${e.ph}
Status: ${e.status}
------------------------\n`;
    });

    document.getElementById("result").innerText = out;
}

/* =========================
   E. COLI SEQUENCE
========================= */

function runNeutralizationSequence(isEvolved) {

    const result = document.getElementById("result");

    result.innerHTML += `
        <br><br><span style="color:cyan;">
        INITIATING CELLULAR INJECTION SEQUENCE...
        </span>
    `;

    setTimeout(() => {
        result.innerHTML += `<br>CHEMICAL MIX ENTERING E.COLI STRUCTURE...`;
    }, 1000);

    setTimeout(() => {

        if (isEvolved) {
            result.innerHTML += `<br>EVOLVED STRAIN DETECTED — COUNTERMEASURE REQUIRED...`;
        } else {
            result.innerHTML += `<br>NORMAL STRAIN RESPONSE STABLE...`;
        }

    }, 2200);

    setTimeout(() => {

        if (isEvolved) {
            result.innerHTML += `
                <br><span style="color:lime;">
                EVOLVED E.COLI ELIMINATED ✔
                </span>
            `;
            localStorage.setItem("ecoliEliminated", "true");
        } else {
            result.innerHTML += `
                <br><span style="color:orange;">
                STANDARD STRAIN NEUTRALIZED
                </span>
            `;
        }

    }, 4000);
}

function triggerVaccineAnimation(potency) {

    const result = document.getElementById("result");

    result.innerHTML += `
        <br><br><span style="color:cyan;">
        VACCINE DELIVERY INITIATED...
        </span>
    `;

    // injection phase
    setTimeout(() => {
        result.innerHTML += `<br>INJECTING ANTIGEN VECTOR INTO E.COLI POPULATION...`;
    }, 1200);

    // diffusion phase
    setTimeout(() => {
        result.innerHTML += `<br>VACCINE DIFFUSION IN PROGRESS... POTENCY: ${potency.toFixed(1)}%`;
    }, 2500);

    // outcome phase
    setTimeout(() => {

        if (potency >= 75) {
            result.innerHTML += `
                <br><span style="color:lime;">
                COMPLETE ERADICATION OF E.COLI STRAIN ✔
                </span>
            `;
            localStorage.setItem("ecoliEliminated", "true");

        } else {
            result.innerHTML += `
                <br><span style="color:orange;">
                PARTIAL ELIMINATION — RESISTANT STRAINS REMAIN
                </span>
            `;
        }

    }, 4200);
}
/* =========================
   pH SYSTEM
========================= */

function checkPH() {

    const acid = parseInt(document.getElementById("acid").value);
const base = parseInt(document.getElementById("base").value);
const stab = parseInt(document.getElementById("stabilizer").value);
    
    let ph = 7;
    let notes = [];

    /* ACIDS */
    switch(acid) {
    case 1:
        ph -= 1.5;
        notes.push("Citric Acid");
        break;
    case 2:
        ph -= 2.8;
        notes.push("Lime Juice");
        break;
    case 3:
        ph -= 2.0;
        notes.push("Vinegar");
        break;
}

    /* BASES */
    switch(base) {
    case 1:
        ph += 2.5;
        notes.push("Baking Soda");
        break;
    case 2:
        ph += 0.3;
        notes.push("Water");
        break;
    case 3:
        ph += 1.2;
        notes.push("Rubbing Alcohol");
        break;
}

    /* STABILIZERS */
    switch(stab) {
    case 1:
        ph = 7 + (ph - 7) * 0.70;
        notes.push("Salt matrix");
        break;
    case 2:
        ph = 7 + (ph - 7) * 0.45;
        notes.push("Sugar buffer");
        break;
    case 3:
        ph = 7 + (ph - 7) * 0.60;
        notes.push("Gelatin structure");
        break;
}

    ph = Math.max(0, Math.min(14, ph));

    attempt++;

    /* EVOLVED STRAIN LOGIC */
    const evolved = (ph < 4.5 || ph > 9.5);

    const inTargetRange = (ph >= 5 && ph <= 6);
    const success = inTargetRange && !evolved;

    let status;

    if (success) {
        status = "TARGET STABILITY ACHIEVED";
    } else if (inTargetRange && evolved) {
        status = "TARGET RANGE BUT MUTATION SURVIVED";
    } else if (ph < 5) {
        status = "TOO ACIDIC";
    } else {
        status = "TOO BASIC";
    }

    document.getElementById("result").innerHTML = `
ENTRY #${attempt}<br><br>

Acid: ${acid || "NONE"}<br>
Base: ${base || "NONE"}<br>
Stabilizer: ${stab || "NONE"}<br><br>

Estimated pH: <b>${ph.toFixed(2)}</b><br>
Status: <b>${status}</b><br><br>

${notes.join("<br>")}
`;

/* SAVE */
const log = getNotebook();
log.push({
    attempt,
    acid,
    base,
    stabilizer: stab,
    ph: ph.toFixed(2),
    status
});
saveNotebook(log);

/* =========================
   WIN / SEQUENCE TRIGGERS
========================= */

/* =========================
   VACCINE TRIGGER SYSTEM
========================= */

const inTargetRange = (ph >= 5 && ph <= 6);

if (inTargetRange) {

    // potency = how close to PERFECT 5.5
    const distance = Math.abs(ph - 5.5);
    const potency = Math.max(0, 100 - (distance * 80));

    triggerVaccineAnimation(potency);

    // optional unlock flag
    if (potency >= 90) {
        localStorage.setItem("phSolved", "true");
    }
}

</script>

</body>
</html>
