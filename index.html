<!DOCTYPE html>
<html>
<head>
<title>DATA NODE</title>

<style>
body {
    margin: 0;
    background: black;
    color: cyan;
    font-family: monospace;
    overflow: hidden;
}

.crt::before {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.05),
        rgba(255,255,255,.05) 1px,
        transparent 1px,
        transparent 4px
    );
    opacity: .15;
    pointer-events: none;
}

.crt::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, transparent 55%, rgba(0,0,0,.7) 100%);
    pointer-events: none;
}

#uploadScreen {
    text-align: center;
    padding-top: 80px;
}

#boot {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    text-align: center;
    padding-top: 120px;
}

#app {
    display: none;
    padding: 40px;
    text-align: center;
}

button {
    margin: 10px;
    padding: 12px 18px;
    background: black;
    color: cyan;
    border: 1px solid cyan;
    cursor: pointer;
}

.panel {
    display: none;
    margin-top: 30px;
}

.phGrid {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

#result {
    margin-top: 15px;
    white-space: pre-wrap;
}
</style>
</head>

<body class="crt">

<div id="uploadScreen">
    <h2>UPLOAD RECOVERED FILE</h2>
    <input type="file" id="fileInput">
    <p id="status">AWAITING INPUT...</p>
</div>

<div id="boot">
    <h2 id="bootText">INITIALIZING...</h2>
</div>

<div id="app">

    <h1>DATA NODE ACCESS GRANTED</h1>

    <button onclick="showPanel('audio')">AUDIO LOG</button>
    <button onclick="showPanel('ph')">pH ANALYSIS</button>
    <button onclick="showNotebook()">LAB NOTEBOOK</button>

    <div id="audioPanel" class="panel">
        <h2>AUDIO LOG</h2>
        <audio controls>
            <source src="audio-log.mp3">
        </audio>
    </div>

    <div id="phPanel" class="panel">
        <h2>CHEMICAL STABILITY ANALYSIS</h2>

        <div class="phGrid">
            <select id="acid">
                <option value="1">1 - Acid 1</option>
                <option value="2">2 - Acid 2</option>
                <option value="3">3 - Acid 3</option>
            </select>

            <select id="base">
                <option value="1">1 - Base 1</option>
                <option value="2">2 - Base 2</option>
                <option value="3">3 - Base 3</option>
            </select>

            <select id="stabilizer">
                <option value="1">1 - Stabilizer 1</option>
                <option value="2">2 - Stabilizer 2</option>
                <option value="3">3 - Stabilizer 3</option>
            </select>
        </div>

        <button onclick="checkPH()">SUBMIT</button>

        <div id="result"></div>
    </div>

</div>

<script>

let attempt = 0;

/* =========================
   IMAGE BOOT FIXED
========================= */

const fileInput = document.getElementById("fileInput");
const statusText = document.getElementById("status");

const boot = document.getElementById("boot");
const bootText = document.getElementById("bootText");
const app = document.getElementById("app");
const uploadScreen = document.getElementById("uploadScreen");

fileInput.addEventListener("change", () => {

    const file = fileInput.files[0];
    if (!file) return;

    if (!file.type.startsWith("image/")) {
        statusText.innerText = "INVALID FILE TYPE";
        return;
    }

    statusText.innerText = "IMAGE RECEIVED";

    uploadScreen.style.display = "none";
    boot.style.display = "block";

    const reader = new FileReader();

    reader.onload = () => {

        localStorage.setItem("uploadedImage", reader.result);

        const msgs = [
            "SCANNING IMAGE STRUCTURE...",
            "DETECTING BIOLOGICAL PATTERNS...",
            "ANALYZING ANOMALIES...",
            "FINALIZING DATA MODEL..."
        ];

        let i = 0;

        const interval = setInterval(() => {
            if (i < msgs.length) {
                bootText.innerText = msgs[i++];
            } else {
                clearInterval(interval);

                bootText.innerText = "IMAGE ANALYSIS COMPLETE";

                setTimeout(() => {
                    boot.style.display = "none";
                    app.style.display = "block";
                }, 1000);
            }
        }, 1200);
    };

    reader.readAsDataURL(file);
});

/* =========================
   MENU
========================= */

function showPanel(type) {
    document.querySelectorAll(".panel").forEach(p => p.style.display = "none");
    document.getElementById(type + "Panel").style.display = "block";
}

/* =========================
   NOTEBOOK
========================= */

function getNotebook() {
    return JSON.parse(localStorage.getItem("labNotebook") || "[]");
}

function saveNotebook(log) {
    localStorage.setItem("labNotebook", JSON.stringify(log));
}

function showNotebook() {

    const log = getNotebook();
    let out = "LAB NOTEBOOK\n\n";

    log.forEach(e => {
        out += `ENTRY #${e.attempt}
Acid: ${e.acid}
Base: ${e.base}
Stabilizer: ${e.stabilizer}
pH: ${e.ph}
Status: ${e.status}
------------------------\n`;
    });

    document.getElementById("result").innerText = out;
}

/* =========================
   pH SYSTEM (UNCHANGED CORE)
========================= */

function checkPH() {

    const acid = parseInt(document.getElementById("acid").value);
    const base = parseInt(document.getElementById("base").value);
    const stab = parseInt(document.getElementById("stabilizer").value);

    let ph = 7;
    let notes = [];

    switch(acid){
        case 1: ph -= 1.5; notes.push("Citric Acid"); break;
        case 2: ph -= 2.8; notes.push("Lime Juice"); break;
        case 3: ph -= 2.0; notes.push("Vinegar"); break;
    }

    switch(base){
        case 1: ph += 2.5; notes.push("Baking Soda"); break;
        case 2: ph += 0.3; notes.push("Water"); break;
        case 3: ph += 1.2; notes.push("Rubbing Alcohol"); break;
    }

    switch(stab){
        case 1: ph = 7 + (ph - 7)*0.7; break;
        case 2: ph = 7 + (ph - 7)*0.45; break;
        case 3: ph = 7 + (ph - 7)*0.6; break;
    }

    ph = Math.max(0, Math.min(14, ph));

    attempt++;

    const inTargetRange = (ph >= 5 && ph <= 6);

    let status = inTargetRange ? "STABLE WINDOW" : "UNSTABLE";

    document.getElementById("result").innerHTML =
    `ENTRY #${attempt}<br><br>
Estimated pH: <b>${ph.toFixed(2)}</b><br>
Status: <b>${status}</b>`;

    const log = getNotebook();
    log.push({attempt, acid, base, stabilizer: stab, ph: ph.toFixed(2), status});
    saveNotebook(log);
}

</script>

</body>
</html>
