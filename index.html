<!DOCTYPE html>
<html>
<head>
<title>DATA RECOVERY NODE</title>

<style>
body {
    margin: 0;
    background: black;
    color: cyan;
    font-family: monospace;
    overflow: hidden;
}

/* CENTER LAYOUT */
#container {
    text-align: center;
    padding-top: 60px;
}

/* CRT OVERLAY */
.crt::before {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.05),
        rgba(255,255,255,.05) 1px,
        transparent 1px,
        transparent 4px
    );
    opacity: .15;
    pointer-events: none;
}

.crt::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(
        circle,
        transparent 55%,
        rgba(0,0,0,.6) 100%
    );
    pointer-events: none;
}

/* BOOT SCREEN */
#boot {
    display: none;
    position: fixed;
    inset: 0;
    background: black;
    color: cyan;
    text-align: center;
    padding-top: 120px;
}

#bootText {
    font-size: 18px;
    letter-spacing: 3px;
    text-shadow: 0 0 10px cyan;
}

/* SCAN BAR */
#scanBar {
    width: 60%;
    height: 6px;
    margin: 40px auto;
    border: 1px solid cyan;
    position: relative;
    overflow: hidden;
}

#scanFill {
    width: 0%;
    height: 100%;
    background: cyan;
    animation: scan 4s linear forwards;
}

@keyframes scan {
    from { width: 0%; }
    to { width: 100%; }
}

/* PUZZLE */
#puzzle {
    display: none;
    margin-top: 40px;
}

input, button {
    margin-top: 10px;
    padding: 10px;
    background: black;
    color: cyan;
    border: 1px solid cyan;
    font-family: monospace;
}
</style>
</head>

<body class="crt">

<div id="container">

    <h1>BIODATA UPLOAD NODE</h1>

    <p>Upload recovered image file</p>

    <input type="file" id="fileInput">

    <div id="status">AWAITING INPUT...</div>

    <div id="puzzle">

        <h2>ACCESS GRANTED</h2>

        <audio id="log" controls>
            <source src="audio-log.mp3">
        </audio>

        <h3>pH INPUT</h3>

        <input id="phInput" placeholder="Enter pH value">
        <button onclick="checkPH()">SUBMIT</button>

        <p id="result"></p>
    </div>

</div>

<!-- BOOT SCREEN -->
<div id="boot">
    <div id="bootText">INITIALIZING DATA EXTRACTION...</div>

    <div id="scanBar">
        <div id="scanFill"></div>
    </div>
</div>

<script>

const fileInput = document.getElementById("fileInput");
const status = document.getElementById("status");
const puzzle = document.getElementById("puzzle");

const boot = document.getElementById("boot");
const bootText = document.getElementById("bootText");

fileInput.addEventListener("change", () => {

    const file = fileInput.files[0];
    if (!file) return;

    // START BOOT SEQUENCE
    status.innerText = "DATA RECEIVED";

    boot.style.display = "block";

    let messages = [
        "INITIALIZING EXTRACTION...",
        "DECRYPTING BIOLOGICAL DATA...",
        "RECONSTRUCTING SIGNAL...",
        "STABILIZING OUTPUT..."
    ];

    let i = 0;

    let interval = setInterval(() => {

        if (i < messages.length) {
            bootText.innerText = messages[i];
            i++;
        } else {
            clearInterval(interval);

            bootText.innerText = "EXTRACTION COMPLETE";

            setTimeout(() => {
                boot.style.display = "none";
                puzzle.style.display = "block";
            }, 1200);
        }

    }, 1200);
});

/* pH CHECK */
function checkPH() {

    const val = parseFloat(document.getElementById("phInput").value);

    if (val >= 5 && val <= 6) {
        document.getElementById("result").innerText =
            "STABILITY ACHIEVED";
    } else {
        document.getElementById("result").innerText =
            "IMBALANCE DETECTED";
    }
}

</script>

</body>
</html>
