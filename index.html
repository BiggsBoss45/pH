<!DOCTYPE html>
<html>
<head>
<title>DATA NODE</title>

<style>
body {
    margin: 0;
    background: black;
    color: cyan;
    font-family: monospace;
    overflow: hidden;
}

.crt::before {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.05),
        rgba(255,255,255,.05) 1px,
        transparent 1px,
        transparent 4px
    );
    opacity: .15;
    pointer-events: none;
}

.crt::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, transparent 55%, rgba(0,0,0,.7) 100%);
    pointer-events: none;
}

#uploadScreen, #boot, #app {
    text-align: center;
}

#boot {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    padding-top: 120px;
}

#app {
    display: none;
    padding: 40px;
    overflow-y: auto;
    height: 100vh;
}

button {
    margin: 10px;
    padding: 12px 18px;
    background: black;
    color: cyan;
    border: 1px solid cyan;
    cursor: pointer;
}

.panel {
    display: none;
    margin-top: 20px;
}

#petri {
    background: #050a05;
    border: 2px solid cyan;
    border-radius: 50%;
    display: block;
    margin: 20px auto;
}

.phGrid {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

#result {
    margin-top: 15px;
    white-space: pre-wrap;
}
</style>
</head>

<body class="crt">

<div id="uploadScreen">
    <h2>UPLOAD RECOVERED FILE</h2>
    <input type="file" id="fileInput">
    <p id="status">AWAITING INPUT...</p>
</div>

<div id="boot">
    <h2 id="bootText">INITIALIZING...</h2>
</div>

<div id="app">

    <h1>DATA NODE ACCESS GRANTED</h1>

    <button onclick="showPanel('audio')">AUDIO LOG</button>
    <button onclick="showPanel('ph')">pH ANALYSIS</button>

    <div id="audioPanel" class="panel">
        <audio controls>
            <source src="audio-log.mp3">
        </audio>
    </div>

    <div id="phPanel" class="panel">

        <canvas id="petri" width="400" height="400"></canvas>

        <div class="phGrid">
            <select id="acid">
                <option value="1">Acid 1</option>
                <option value="2">Acid 2</option>
                <option value="3">Acid 3</option>
            </select>

            <select id="base">
                <option value="1">Base 1</option>
                <option value="2">Base 2</option>
                <option value="3">Base 3</option>
            </select>

            <select id="stabilizer">
                <option value="1">Stabilizer 1</option>
                <option value="2">Stabilizer 2</option>
                <option value="3">Stabilizer 3</option>
            </select>
        </div>

        <button onclick="checkPH()">SUBMIT</button>
        <div id="result"></div>
    </div>
</div>

<script>
let attempt = 0;

const canvas = document.getElementById("petri");
const ctx = canvas.getContext("2d");

let ecoli = [];

const VACCINE_NAME = "VX-ALPHA-3B1";

/* =========================
   BOOT
========================= */

const fileInput = document.getElementById("fileInput");
const statusText = document.getElementById("status");

fileInput.addEventListener("change", () => {

    const file = fileInput.files[0];
    if (!file) return;

    if (!file.type.startsWith("image/")) {
        statusText.innerText = "INVALID FILE TYPE";
        return;
    }

    statusText.innerText = "IMAGE RECEIVED";

    document.getElementById("uploadScreen").style.display = "none";
    document.getElementById("boot").style.display = "block";

    const msgs = [
        "SCANNING IMAGE STRUCTURE...",
        "DETECTING BIOLOGICAL PATTERNS...",
        "ANALYZING ANOMALIES...",
        "FINALIZING DATA MODEL..."
    ];

    let i = 0;
    const bootText = document.getElementById("bootText");

    const interval = setInterval(() => {
        if (i < msgs.length) {
            bootText.innerText = msgs[i++];
        } else {
            clearInterval(interval);
            bootText.innerText = "ANALYSIS COMPLETE";

            setTimeout(() => {
                document.getElementById("boot").style.display = "none";
                document.getElementById("app").style.display = "block";

                initEcoli();
                drawPetri();
            }, 1000);
        }
    }, 1200);
});

/* =========================
   MENU
========================= */

function showPanel(type) {
    document.querySelectorAll(".panel").forEach(p => p.style.display = "none");
    document.getElementById(type + "Panel").style.display = "block";
}

/* =========================
   PETRI
========================= */

function initEcoli(count = 60) {
    ecoli = [];

    for (let i = 0; i < count; i++) {
        ecoli.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 1.5,
            vy: (Math.random() - 0.5) * 1.5,
            alive: true,
            reviveTimer: 0
        });
    }
}

function drawPetri() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let b of ecoli) {

        if (!b.alive) {
            if (b.reviveTimer > 0 && b.reviveTimer !== Infinity) {
                b.reviveTimer--;
                if (b.reviveTimer <= 0) b.alive = true;
            }

            ctx.fillStyle = "rgba(0,255,0,0.08)";
            ctx.beginPath();
            ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
            ctx.fill();
            continue;
        }

        b.x += b.vx;
        b.y += b.vy;

        if (b.x < 0 || b.x > canvas.width) b.vx *= -1;
        if (b.y < 0 || b.y > canvas.height) b.vy *= -1;

        ctx.fillStyle = "lime";
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
        ctx.fill();
    }

    requestAnimationFrame(drawPetri);
}

/* =========================
   KILL SYSTEM
========================= */

function killTemporary(amount, duration = 120) {

    let alive = ecoli.filter(e => e.alive);

    for (let i = 0; i < amount && alive.length > 0; i++) {
        setTimeout(() => {
            let still = ecoli.filter(e => e.alive);
            if (!still.length) return;

            let target = still[Math.floor(Math.random() * still.length)];
            target.alive = false;
            target.reviveTimer = duration;
        }, i * 80);
    }
}

function killPermanent(amount, delay = 60) {

    let alive = ecoli.filter(e => e.alive);

    for (let i = 0; i < amount && alive.length > 0; i++) {
        setTimeout(() => {
            let still = ecoli.filter(e => e.alive);
            if (!still.length) return;

            let target = still[Math.floor(Math.random() * still.length)];
            target.alive = false;
            target.reviveTimer = Infinity;
        }, i * delay);
    }
}

/* =========================
   VACCINE
========================= */

function revealVaccineName() {
    document.getElementById("result").innerHTML += `
        <br><br>
        <span style="color:lime">
        FINAL VACCINE IDENTIFIED:<br>
        <b>${VACCINE_NAME}</b>
        </span>
    `;
}

/* =========================
   GAME LOGIC
========================= */

function checkPH() {

    let ph = 7;

    const acid = parseInt(document.getElementById("acid").value);
    const base = parseInt(document.getElementById("base").value);
    const stab = parseInt(document.getElementById("stabilizer").value);

    const correctCombo =
        acid === 3 &&
        base === 2 &&
        stab === 1;

    switch(acid){
        case 1: ph -= 1.5; break;
        case 2: ph -= 2.8; break;
        case 3: ph -= 2.0; break;
    }

    switch(base){
        case 1: ph += 2.5; break;
        case 2: ph += 0.3; break;
        case 3: ph += 1.2; break;
    }

    switch(stab){
        case 1: ph = 7 + (ph - 7) * 0.7; break;
        case 2: ph = 7 + (ph - 7) * 0.45; break;
        case 3: ph = 7 + (ph - 7) * 0.6; break;
    }

    ph = Math.max(0, Math.min(14, ph));

    attempt++;

    const inTarget = (ph >= 5 && ph <= 6);

    let aliveCount = ecoli.filter(e => e.alive).length;

    const result = document.getElementById("result");

    result.innerHTML = "";

    // WRONG RANGE
    if (!inTarget) {

        killTemporary(Math.floor(aliveCount * 0.35), 160);

        result.innerHTML =
        `ENTRY #${attempt}<br><br>
        pH: <b>${ph.toFixed(2)}</b><br>
        STATUS: <b>UNSTABLE</b>`;

        return;
    }

    // RIGHT RANGE BUT WRONG COMBO
    if (inTarget && !correctCombo) {

        killTemporary(aliveCount, 120);

        result.innerHTML =
        `ENTRY #${attempt}<br><br>
        pH: <b>${ph.toFixed(2)}</b><br>
        STATUS: <b>STABLE BUT INCORRECT</b>`;

        return;
    }

   // PERFECT COMBO
// PERFECT COMBO
killPermanent(aliveCount, 40);

console.log("CORRECT COMBINATION DETECTED");

result.innerHTML = `
<div style="margin-top:-10px;">

ENTRY #${attempt}<br><br>

pH: <b>${ph.toFixed(2)}</b><br>

STATUS: <b style="color:lime;">PERFECT MATCH</b>

</div>

<button id="vaccineBtn"
style="
    display:block;
    margin:25px auto 10px auto;
    padding:18px 28px;
    font-size:20px;
    font-weight:bold;
    border:2px solid lime;
    color:lime;
    background:black;
    box-shadow:0 0 15px lime;
    cursor:pointer;
">
    GENERATE VACCINE
</button>
`;

document
.getElementById("vaccineBtn")
.addEventListener("click", generateVaccine);
}

function generateVaccine() {

    const result = document.getElementById("result");

    if (document.getElementById("vaccineReveal")) return;

    result.innerHTML += `
        <div id="vaccineReveal"
        style="
            color:lime;
            font-size:22px;
            margin-top:20px;
        ">
            FINAL VACCINE IDENTIFIED:<br><br>
            <b>VX-ALPHA-3B1</b>
        </div>
    `;
}
</script>

</body>
</html>
