<!DOCTYPE html>
<html>
<head>
<title>DATA NODE</title>

<style>
body {
    margin: 0;
    background: black;
    color: cyan;
    font-family: monospace;
    overflow: hidden;
}

/* CRT */
.crt::before {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.05),
        rgba(255,255,255,.05) 1px,
        transparent 1px,
        transparent 4px
    );
    opacity: .15;
    pointer-events: none;
}

.crt::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, transparent 55%, rgba(0,0,0,.7) 100%);
    pointer-events: none;
}

/* UPLOAD */
#uploadScreen {
    text-align: center;
    padding-top: 80px;
}

/* BOOT */
#boot {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    text-align: center;
    padding-top: 120px;
}

/* APP */
#app {
    display: none;
    padding: 40px;
    text-align: center;
}

/* BUTTONS */
button {
    margin: 10px;
    padding: 12px 18px;
    background: black;
    color: cyan;
    border: 1px solid cyan;
    cursor: pointer;
}

/* PANELS */
.panel {
    display: none;
    margin-top: 30px;
}

/* INPUTS */
.phGrid {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

.phGrid input {
    width: 140px;
    padding: 10px;
    background: black;
    color: cyan;
    border: 1px solid cyan;
    text-align: center;
}

/* RESULT */
#result {
    margin-top: 15px;
    white-space: pre-wrap;
}
</style>
</head>

<body class="crt">

<!-- UPLOAD SCREEN -->
<div id="uploadScreen">
    <h2>UPLOAD RECOVERED FILE</h2>
    <input type="file" id="fileInput">
    <p id="status">AWAITING INPUT...</p>
</div>

<!-- BOOT -->
<div id="boot">
    <h2 id="bootText">INITIALIZING...</h2>
</div>

<!-- MAIN APP -->
<div id="app">

    <h1>DATA NODE ACCESS GRANTED</h1>

    <button onclick="showPanel('audio')">AUDIO LOG</button>
    <button onclick="showPanel('ph')">pH ANALYSIS</button>
    <button onclick="showNotebook()">LAB NOTEBOOK</button>

    <!-- AUDIO -->
    <div id="audioPanel" class="panel">
        <h2>AUDIO LOG</h2>
        <audio controls>
            <source src="audio-log.mp3">
        </audio>
    </div>

    <!-- pH -->
    <div id="phPanel" class="panel">
        <h2>CHEMICAL STABILITY ANALYSIS</h2>

        <p>Select 1 Acid, 1 Base, 1 Stabilizer</p>

        <div class="phGrid">
            <input id="acid" placeholder="ACID">
            <input id="base" placeholder="BASE">
            <input id="stabilizer" placeholder="STABILIZER">
        </div>

        <button onclick="checkPH()">SUBMIT</button>

        <div id="result"></div>
    </div>

</div>

<script>

/* =========================
   UPLOAD → BOOT → APP
========================= */

const fileInput = document.getElementById("fileInput");
const statusText = document.getElementById("status");

const boot = document.getElementById("boot");
const bootText = document.getElementById("bootText");
const app = document.getElementById("app");
const uploadScreen = document.getElementById("uploadScreen");

fileInput.addEventListener("change", () => {

    if (!fileInput.files[0]) return;

    statusText.innerText = "DATA RECEIVED";

    uploadScreen.style.display = "none";
    boot.style.display = "block";

    const msgs = [
        "INITIALIZING EXTRACTION...",
        "DECRYPTING SIGNAL...",
        "REBUILDING DATA STRUCTURE...",
        "FINALIZING..."
    ];

    let i = 0;

    const interval = setInterval(() => {

        if (i < msgs.length) {
            bootText.innerText = msgs[i];
            i++;
        } else {
            clearInterval(interval);

            bootText.innerText = "ACCESS GRANTED";

            setTimeout(() => {
                boot.style.display = "none";
                app.style.display = "block";
            }, 1000);
        }

    }, 1200);
});

/* =========================
   MENU
========================= */

function showPanel(type) {
    document.querySelectorAll(".panel").forEach(p => p.style.display = "none");
    document.getElementById(type + "Panel").style.display = "block";
}

/* =========================
   LAB NOTEBOOK MEMORY
========================= */

function getNotebook() {
    return JSON.parse(localStorage.getItem("labNotebook") || "[]");
}

function saveNotebook(log) {
    localStorage.setItem("labNotebook", JSON.stringify(log));
}

function showNotebook() {

    const log = getNotebook();

    let out = "LAB NOTEBOOK\n\n";

    log.forEach(e => {
        out += `ENTRY #${e.attempt}
Acid: ${e.acid}
Base: ${e.base}
Stabilizer: ${e.stabilizer}
pH: ${e.ph}
Status: ${e.status}
------------------------\n`;
    });

    document.getElementById("result").innerText = out;
}

/* =========================
   pH SYSTEM
========================= */

function checkPH() {

    const acid = document.getElementById("acid").value.toUpperCase().trim();
    const base = document.getElementById("base").value.toUpperCase().trim();
    const stab = document.getElementById("stabilizer").value.toUpperCase().trim();

    let ph = 7;
    let notes = [];

    /* =========================
       ACIDS (REAL WORLD MAPPED)
    ========================== */

    switch(acid) {

        case "ACID-1":
            ph -= 1.5;
            notes.push("Citric Acid detected (weak organic acid)");
            break;

        case "ACID-2":
            ph -= 2.8;
            notes.push("Lime Juice detected (high citric concentration)");
            break;

        case "ACID-3":
            ph -= 2.0;
            notes.push("Vinegar detected (acetic acid solution)");
            break;
    }

    /* =========================
       BASES (REAL WORLD MAPPED)
    ========================== */

    switch(base) {

        case "BASE-1":
            ph += 2.5;
            notes.push("Baking Soda detected (sodium bicarbonate)");
            break;

        case "BASE-2":
            ph += 0.3;
            notes.push("Water detected (neutral dilution buffer)");
            break;

        case "BASE-3":
            ph += 1.2;
            notes.push("Rubbing Alcohol detected (volatile solvent disruption)");
            break;
    }

    /* =========================
       STABILIZERS (REAL WORLD MAPPED)
    ========================== */

    switch(stab) {

        case "STABILIZER-1":
            ph = 7 + (ph - 7) * 0.70;
            notes.push("Salt matrix stabilization active");
            break;

        case "STABILIZER-2":
            ph = 7 + (ph - 7) * 0.45;
            notes.push("Sugar polymer buffering active");
            break;

        case "STABILIZER-3":
            ph = 7 + (ph - 7) * 0.60;
            notes.push("Gelatin structural stabilization detected");
            break;
    }

    /* clamp */
    ph = Math.max(0, Math.min(14, ph));

    attempt++;

    let status = "";

    if (ph >= 5 && ph <= 6) {
        status = "TARGET RANGE ACHIEVED";
    }
    else if (ph < 5) {
        status = "TOO ACIDIC";
    }
    else {
        status = "TOO BASIC";
    }

    /* DISPLAY */
    document.getElementById("result").innerHTML = `
        ENTRY #${attempt}<br><br>

        Acid: ${acid || "NONE"}<br>
        Base: ${base || "NONE"}<br>
        Stabilizer: ${stab || "NONE"}<br><br>

        Estimated pH: <b>${ph.toFixed(2)}</b><br>
        Status: <b>${status}</b><br><br>

        ${notes.join("<br>")}
    `;

    /* SAVE NOTEBOOK (SESSION ONLY FIX IS ALREADY GOOD) */
    const log = JSON.parse(sessionStorage.getItem("labNotebook") || "[]");

    log.push({
        attempt,
        acid,
        base,
        stabilizer: stab,
        ph: ph.toFixed(2),
        status
    });

    sessionStorage.setItem("labNotebook", JSON.stringify(log));

    /* WIN CONDITION */
    if (status === "TARGET RANGE ACHIEVED") {
        localStorage.setItem("phSolved", "true");

        document.getElementById("result").innerHTML += `
            <br><br>
            <span style="color:lime;">
                BIOLOGICAL STABILITY ACHIEVED
            </span>
        `;
    }
}
</script>

</body>
</html>
