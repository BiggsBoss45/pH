<!DOCTYPE html>
<html>
<head>
<title>DATA NODE</title>

<style>
body {
    background: black;
    color: cyan;
    font-family: monospace;
    text-align: center;
    padding-top: 60px;
}

#puzzle {
    display: none;
    margin-top: 30px;
}

input, button {
    margin-top: 10px;
    padding: 10px;
    background: black;
    color: cyan;
    border: 1px solid cyan;
    font-family: monospace;
}

#status {
    margin-top: 20px;
    opacity: 0.8;
}
</style>
</head>

<body>

<h1>BIODATA UPLOAD TERMINAL</h1>

<p>Upload recovered image file</p>

<input type="file" id="fileInput">

<div id="status">AWAITING INPUT...</div>

<div id="puzzle">

    <h2>ACCESS GRANTED</h2>

    <audio id="log" controls>
        <source src="audio-log.mp3" type="audio/mpeg">
    </audio>

    <h3>pH ANALYSIS</h3>

    <input id="phInput" placeholder="Enter pH value">
    <button onclick="checkPH()">SUBMIT</button>

    <p id="result"></p>

</div>

<script>

const fileInput = document.getElementById("fileInput");
const status = document.getElementById("status");
const puzzle = document.getElementById("puzzle");

let uploaded = false;

/* ACCEPT ANY FILE */
fileInput.addEventListener("change", () => {

    const file = fileInput.files[0];

    if (!file) return;

    uploaded = true;

    status.innerText = "DATA RECEIVED // EXTRACTION COMPLETE";

    setTimeout(() => {
        puzzle.style.display = "block";
    }, 1200);
});

/* pH CHECK */
function checkPH() {

    const val = parseFloat(document.getElementById("phInput").value);

    if (val >= 5 && val <= 6) {
        document.getElementById("result").innerText =
            "STABILITY ACHIEVED // SYSTEM RESTORED";
    } else {
        document.getElementById("result").innerText =
            "IMBALANCE DETECTED";
    }
}

</script>

</body>
</html>
