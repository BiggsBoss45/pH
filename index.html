<!DOCTYPE html>
<html>
<head>
<title>DATA NODE</title>

<style>
body {
    margin: 0;
    background: black;
    color: cyan;
    font-family: monospace;
    overflow: hidden;
}

/* CRT */
.crt::before {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.05),
        rgba(255,255,255,.05) 1px,
        transparent 1px,
        transparent 4px
    );
    opacity: .15;
    pointer-events: none;
}

.crt::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, transparent 55%, rgba(0,0,0,.7) 100%);
    pointer-events: none;
}

/* UPLOAD */
#uploadScreen {
    text-align: center;
    padding-top: 80px;
}

/* BOOT */
#boot {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    text-align: center;
    padding-top: 120px;
}

/* APP */
#app {
    display: none;
    padding: 40px;
    text-align: center;
}

/* BUTTONS */
button {
    margin: 10px;
    padding: 12px 18px;
    background: black;
    color: cyan;
    border: 1px solid cyan;
    cursor: pointer;
}

/* PANELS */
.panel {
    display: none;
    margin-top: 30px;
}

/* INPUTS */
.phGrid {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

.phGrid input {
    width: 140px;
    padding: 10px;
    background: black;
    color: cyan;
    border: 1px solid cyan;
    text-align: center;
}

/* RESULT */
#result {
    margin-top: 15px;
    white-space: pre-wrap;
}
</style>
</head>

<body class="crt">

<!-- UPLOAD SCREEN -->
<div id="uploadScreen">
    <h2>UPLOAD RECOVERED FILE</h2>
    <input type="file" id="fileInput">
    <p id="status">AWAITING INPUT...</p>
</div>

<!-- BOOT -->
<div id="boot">
    <h2 id="bootText">INITIALIZING...</h2>
</div>

<!-- MAIN APP -->
<div id="app">

    <h1>DATA NODE ACCESS GRANTED</h1>

    <button onclick="showPanel('audio')">AUDIO LOG</button>
    <button onclick="showPanel('ph')">pH ANALYSIS</button>
    <button onclick="showNotebook()">LAB NOTEBOOK</button>

    <!-- AUDIO -->
    <div id="audioPanel" class="panel">
        <h2>AUDIO LOG</h2>
        <audio controls>
            <source src="audio-log.mp3">
        </audio>
    </div>

    <!-- pH -->
    <div id="phPanel" class="panel">
        <h2>CHEMICAL STABILITY ANALYSIS</h2>

        <p>Select 1 Acid, 1 Base, 1 Stabilizer</p>

        <div class="phGrid">
            <input id="acid" placeholder="ACID">
            <input id="base" placeholder="BASE">
            <input id="stabilizer" placeholder="STABILIZER">
        </div>

        <button onclick="checkPH()">SUBMIT</button>

        <div id="result"></div>
    </div>

</div>

<script>

/* =========================
   UPLOAD → BOOT → APP
========================= */

const fileInput = document.getElementById("fileInput");
const statusText = document.getElementById("status");

const boot = document.getElementById("boot");
const bootText = document.getElementById("bootText");
const app = document.getElementById("app");
const uploadScreen = document.getElementById("uploadScreen");

fileInput.addEventListener("change", () => {

    if (!fileInput.files[0]) return;

    statusText.innerText = "DATA RECEIVED";

    uploadScreen.style.display = "none";
    boot.style.display = "block";

    const msgs = [
        "INITIALIZING EXTRACTION...",
        "DECRYPTING SIGNAL...",
        "REBUILDING DATA STRUCTURE...",
        "FINALIZING..."
    ];

    let i = 0;

    const interval = setInterval(() => {

        if (i < msgs.length) {
            bootText.innerText = msgs[i];
            i++;
        } else {
            clearInterval(interval);

            bootText.innerText = "ACCESS GRANTED";

            setTimeout(() => {
                boot.style.display = "none";
                app.style.display = "block";
            }, 1000);
        }

    }, 1200);
});

/* =========================
   MENU
========================= */

function showPanel(type) {
    document.querySelectorAll(".panel").forEach(p => p.style.display = "none");
    document.getElementById(type + "Panel").style.display = "block";
}

/* =========================
   LAB NOTEBOOK MEMORY
========================= */

function getNotebook() {
    return JSON.parse(localStorage.getItem("labNotebook") || "[]");
}

function saveNotebook(log) {
    localStorage.setItem("labNotebook", JSON.stringify(log));
}

function showNotebook() {

    const log = getNotebook();

    let out = "LAB NOTEBOOK\n\n";

    log.forEach(e => {
        out += `ENTRY #${e.attempt}
Acid: ${e.acid}
Base: ${e.base}
Stabilizer: ${e.stabilizer}
pH: ${e.ph}
Status: ${e.status}
------------------------\n`;
    });

    document.getElementById("result").innerText = out;
}

/* =========================
   pH SYSTEM
========================= */

let attempt = 0;

function checkPH() {

    const acid = document.getElementById("acid").value.toLowerCase().trim();
    const base = document.getElementById("base").value.toLowerCase().trim();
    const stab = document.getElementById("stabilizer").value.toLowerCase().trim();

    let ph = 7;
    let notes = [];

    if (acid === "vinegar") {
        ph -= 2;
        notes.push("acid shift -2");
    }

    if (base === "baking soda") {
        ph += 2.5;
        notes.push("base shift +2.5");
    }

    if (stab === "water") ph = 7 + (ph - 7) * 0.4;
    if (stab === "sugar") ph = 7 + (ph - 7) * 0.6;

    ph = Math.max(0, Math.min(14, ph));

    attempt++;

    let status =
        ph >= 5 && ph <= 6 ? "TARGET RANGE ACHIEVED" :
        ph < 5 ? "TOO ACIDIC" :
        "TOO BASIC";

    document.getElementById("result").innerHTML =
        `ENTRY #${attempt}<br><br>
        Acid: ${acid || "none"}<br>
        Base: ${base || "none"}<br>
        Stabilizer: ${stab || "none"}<br><br>
        pH: <b>${ph.toFixed(2)}</b><br>
        Status: <b>${status}</b><br><br>
        ${notes.join("<br>")}`;

    const log = getNotebook();

    log.push({
        attempt,
        acid,
        base,
        stabilizer: stab,
        ph: ph.toFixed(2),
        status
    });

    saveNotebook(log);

    /* =========================
       WIN CONDITION HOOK (IMPORTANT)
       ========================= */
    if (status === "TARGET RANGE ACHIEVED") {
        localStorage.setItem("phSolved", "true");
        console.log("PH PUZZLE SOLVED");
    }
}

</script>

</body>
</html>
