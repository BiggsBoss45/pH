<!DOCTYPE html>
<html>
<head>
<title>DATA NODE</title>

<style>
body {
    margin: 0;
    background: black;
    color: cyan;
    font-family: monospace;
    overflow: hidden;
}

.crt::before {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.05),
        rgba(255,255,255,.05) 1px,
        transparent 1px,
        transparent 4px
    );
    opacity: .15;
    pointer-events: none;
}

.crt::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, transparent 55%, rgba(0,0,0,.7) 100%);
    pointer-events: none;
}

#uploadScreen {
    text-align: center;
    padding-top: 80px;
}

#boot {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    text-align: center;
    padding-top: 120px;
}

#app {
    display: none;
    padding: 40px;
    text-align: center;
}

#petri {
    background: #050a05;
    border: 2px solid cyan;
    border-radius: 50%;
    display: block;
    margin: 20px auto;
}

button {
    margin: 10px;
    padding: 12px 18px;
    background: black;
    color: cyan;
    border: 1px solid cyan;
    cursor: pointer;
}

.panel {
    display: none;
    margin-top: 30px;
}

.phGrid {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

#result {
    margin-top: 15px;
    white-space: pre-wrap;
}
</style>
</head>

<body class="crt">

<div id="uploadScreen">
    <h2>UPLOAD RECOVERED FILE</h2>
    <input type="file" id="fileInput">
    <p id="status">AWAITING INPUT...</p>
</div>

<div id="boot">
    <h2 id="bootText">INITIALIZING...</h2>
</div>

<div id="app">

    <h1>DATA NODE ACCESS GRANTED</h1>

    <button onclick="showPanel('ph')">pH ANALYSIS</button>

    <div id="phPanel" class="panel">

        <h2>CHEMICAL STABILITY ANALYSIS</h2>

        <!-- 🧫 PETRI DISH -->
        <canvas id="petri" width="400" height="400"></canvas>

        <div class="phGrid">
            <select id="acid">
                <option value="1">1 - Acid 1</option>
                <option value="2">2 - Acid 2</option>
                <option value="3">3 - Acid 3</option>
            </select>

            <select id="base">
                <option value="1">1 - Base 1</option>
                <option value="2">2 - Base 2</option>
                <option value="3">3 - Base 3</option>
            </select>

            <select id="stabilizer">
                <option value="1">1 - Stabilizer 1</option>
                <option value="2">2 - Stabilizer 2</option>
                <option value="3">3 - Stabilizer 3</option>
            </select>
        </div>

        <button onclick="checkPH()">SUBMIT</button>

        <div id="result"></div>
    </div>

</div>

<script>

let attempt = 0;

/* =========================
   CANVAS SYSTEM
========================= */

const canvas = document.getElementById("petri");
const ctx = canvas.getContext("2d");

let ecoli = [];

function initEcoli(count = 60) {
    ecoli = [];
    for (let i = 0; i < count; i++) {
        ecoli.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            alive: true,
            vx: (Math.random() - 0.5) * 1.5,
            vy: (Math.random() - 0.5) * 1.5
        });
    }
}

initEcoli();

function drawPetri() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let b of ecoli) {
        if (!b.alive) continue;

        b.x += b.vx;
        b.y += b.vy;

        if (b.x < 0 || b.x > canvas.width) b.vx *= -1;
        if (b.y < 0 || b.y > canvas.height) b.vy *= -1;

        ctx.beginPath();
        ctx.fillStyle = "lime";
        ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
        ctx.fill();
    }

    requestAnimationFrame(drawPetri);
}

drawPetri();

/* =========================
   DEATH ANIMATION
========================= */

function killRandomEcoli(amount, speed = 1) {
    let alive = ecoli.filter(e => e.alive);

    for (let i = 0; i < amount && alive.length > 0; i++) {
        let target = alive[Math.floor(Math.random() * alive.length)];

        setTimeout(() => {
            target.alive = false;
        }, i * speed * 100);
    }
}

/* =========================
   pH SYSTEM
========================= */

function checkPH() {

    const acid = parseInt(document.getElementById("acid").value);
    const base = parseInt(document.getElementById("base").value);
    const stab = parseInt(document.getElementById("stabilizer").value);

    let ph = 7;

    switch(acid){
        case 1: ph -= 1.5; break;
        case 2: ph -= 2.8; break;
        case 3: ph -= 2.0; break;
    }

    switch(base){
        case 1: ph += 2.5; break;
        case 2: ph += 0.3; break;
        case 3: ph += 1.2; break;
    }

    switch(stab){
        case 1: ph = 7 + (ph - 7)*0.7; break;
        case 2: ph = 7 + (ph - 7)*0.45; break;
        case 3: ph = 7 + (ph - 7)*0.6; break;
    }

    ph = Math.max(0, Math.min(14, ph));

    attempt++;

    const inTargetRange = (ph >= 5 && ph <= 6);
    const closeRange = (ph >= 4 && ph <= 7);

    /* RESET IF EMPTY */
    if (ecoli.length === 0) initEcoli(60);

    /* NO RESPONSE */
    if (!closeRange) {
        document.getElementById("result").innerHTML =
        `ENTRY #${attempt}<br><br>No biological response.`;
        return;
    }

    /* PARTIAL DEATH */
    if (closeRange && !inTargetRange) {
        killRandomEcoli(12, 2);
    }

    /* FULL WIPE (ONE BY ONE) */
    if (inTargetRange) {
        killRandomEcoli(ecoli.filter(e => e.alive).length, 1.2);
    }

    let status = inTargetRange ? "STABLE WINDOW" : "UNSTABLE RANGE";

    document.getElementById("result").innerHTML =
    `ENTRY #${attempt}<br><br>
Estimated pH: <b>${ph.toFixed(2)}</b><br>
Status: <b>${status}</b>`;
}

/* =========================
   UI (MINIMAL)
========================= */

function showPanel(type) {
    document.querySelectorAll(".panel").forEach(p => p.style.display = "none");
    document.getElementById(type + "Panel").style.display = "block";
}

</script>

</body>
</html>
